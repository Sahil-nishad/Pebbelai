<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Stacked pebbles icon - Enlarged and centered vertically -->
  <g transform="translate(10, 10)">
    <!-- Bottom stone -->
    <ellipse cx="45" cy="90" rx="35" ry="14" fill="#1A1A1A"/>
    <!-- Stone 2 -->
    <ellipse cx="45" cy="72" rx="30" ry="12" fill="#333333"/>
    <!-- Stone 3 -->
    <ellipse cx="45" cy="56" rx="25" ry="11" fill="#4D4D4D"/>
    <!-- Stone 4 -->
    <ellipse cx="45" cy="40" rx="20" ry="10" fill="#808080"/>
    <!-- Top stone -->
    <ellipse cx="45" cy="26" rx="15" ry="8" fill="#B3B3B3"/>
  </g>

  <!-- Text elements - Bold, large, and clear -->
  <text x="100" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="900" fill="#000000" style="letter-spacing: -1px;">PEBEL</text>
  <text x="102" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#555555" style="letter-spacing: 5px;">RESUME BUILDER</text>
  <text x="102" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-style="italic" fill="#888888">by DuneAI</text>
</svg>
